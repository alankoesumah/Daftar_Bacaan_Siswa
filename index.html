<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pencatatan Buku Baca Siswa</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

<div class="max-w-2xl mx-auto px-4 py-6">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-6 border-b border-slate-200 pb-4">
    <div>
      <h1 class="text-xl font-bold text-slate-800">Pencatatan Buku Baca</h1>
      <p class="text-xs text-slate-500">Sistem Informasi Bacaan Siswa</p>
    </div>
    <span id="tahunAjaranLabel" class="text-xs font-semibold px-2.5 py-1 bg-blue-50 text-blue-700 rounded-full border border-blue-200"></span>
  </div>

  <!-- BANNER STATUS KONEKSI / DEMO MODE -->
  <div id="statusBanner" class="mb-4 p-3 bg-amber-50 border border-amber-200 rounded-xl text-xs text-amber-800 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="inline-block w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
      <span id="statusText"><strong>Mode Demo:</strong> Menampilkan data contoh. Hubungkan ke Apps Script untuk data asli Google Sheets.</span>
    </div>
  </div>

  <!-- BREADCRUMB / TOMBOL KEMBALI -->
  <div id="breadcrumb" class="hidden mb-4">
    <button onclick="tampilkanViewKelas()" class="text-xs font-medium text-blue-600 hover:text-blue-800 flex items-center gap-1 bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-xs">
      &larr; Kembali ke daftar kelas
    </button>
  </div>

  <!-- LOADING INDICATOR -->
  <div id="loading" class="text-center text-slate-500 py-12">
    <div class="inline-block animate-spin rounded-full h-6 w-6 border-2 border-blue-600 border-t-transparent mb-2"></div>
    <p class="text-xs font-medium">Memuat data dari Google Sheets...</p>
  </div>

  <!-- VIEW 1: PILIH KELAS -->
  <div id="viewKelas" class="hidden">
    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Pilih Kelas</p>
    <div id="gridKelas" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3"></div>
  </div>

  <!-- VIEW 2: DAFTAR SISWA -->
  <div id="viewSiswa" class="hidden">
    <div class="flex justify-between items-center mb-3">
      <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Daftar Siswa Kelas <span id="labelKelasAktif" class="text-slate-800 font-bold"></span></p>
    </div>
    <div id="listSiswa" class="space-y-2"></div>
  </div>

</div>

<!-- MODAL: INPUT BUKU -->
<div id="modalInput" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 z-50">
  <div class="bg-white rounded-xl w-full max-w-md p-5 shadow-xl border border-slate-100">
    <h2 class="font-bold text-slate-800 text-base mb-0.5">Input Buku Dibaca</h2>
    <p id="infoSiswaInput" class="text-xs text-slate-500 mb-4 font-medium"></p>

    <div id="daftarInputBuku" class="space-y-2 max-h-60 overflow-y-auto pr-1"></div>

    <button onclick="tambahBarisJudul()" class="mt-3 text-xs font-semibold text-blue-600 hover:text-blue-800 flex items-center gap-1">
      + Tambah buku lain
    </button>

    <div class="flex gap-2 mt-5 pt-3 border-t border-slate-100">
      <button onclick="tutupModalInput()" class="flex-1 py-2 text-xs rounded-lg border border-slate-300 text-slate-600 font-medium hover:bg-slate-50">Batal</button>
      <button onclick="simpanSemuaBuku()" id="btnSimpan" class="flex-1 py-2 text-xs rounded-lg bg-blue-600 text-white font-semibold hover:bg-blue-700 shadow-xs">Simpan semua</button>
    </div>
  </div>
</div>

<!-- MODAL: RIWAYAT BACA -->
<div id="modalRiwayat" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 z-50">
  <div class="bg-white rounded-xl w-full max-w-md p-5 max-h-[80vh] flex flex-col shadow-xl border border-slate-100">
    <h2 class="font-bold text-slate-800 text-base mb-0.5">Riwayat Baca</h2>
    <p id="infoSiswaRiwayat" class="text-xs text-slate-500 mb-4 font-medium"></p>

    <div id="listRiwayat" class="space-y-2 overflow-y-auto flex-1 pr-1"></div>

    <button onclick="tutupModalRiwayat()" class="mt-4 py-2 text-xs rounded-lg border border-slate-300 text-slate-600 font-medium hover:bg-slate-50">Tutup</button>
  </div>
</div>

<!-- CUSTOM NOTIFICATION BOX -->
<div id="alertBox" class="hidden fixed bottom-4 right-4 bg-slate-800 text-white text-xs px-4 py-3 rounded-xl shadow-xl z-50 flex items-center gap-3">
  <span id="alertMessage"></span>
  <button onclick="tutupAlert()" class="text-slate-400 hover:text-white font-bold">&times;</button>
</div>

<script>
// ============================================================
// GANTI dengan URL Web App Apps Script (berakhiran /exec)
// ============================================================
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbyE1eoQaOpPH4anfoZm-vOuOehIu5l_LgEHigH-XIy-PvRvCBrLFjoRCv-1JsOokPzGGA/exec';

let siswaAktif = null;
let CACHE_SISWA = []; // Memori lokal untuk menyimpan data siswa (optimasi kecepatan)

// DATA DEMO (Ditampilkan otomatis jika WEBAPP_URL belum diisi / invalid)
const MOCK_DATA = {
  tahunAjaran: '2025/2026',
  kelas: ['7A', '7B', '8A', '8B', '9A', '9B'],
  siswa: [
    { id: '1001', namaPanggilan: 'Andi', namaLengkap: 'Andi Firmansyah', kelas: '7A' },
    { id: '1002', namaPanggilan: 'Budi', namaLengkap: 'Budi Santoso', kelas: '7A' },
    { id: '1003', namaPanggilan: 'Siti', namaLengkap: 'Siti Rahma', kelas: '7A' },
    { id: '2001', namaPanggilan: 'Citra', namaLengkap: 'Citra Dewi', kelas: '7B' },
    { id: '2002', namaPanggilan: 'Doni', namaLengkap: 'Doni Setiawan', kelas: '7B' },
    { id: '3001', namaPanggilan: 'Eka', namaLengkap: 'Eka Putri', kelas: '8A' }
  ],
  riwayat: {
    '1001': [
      { tanggal: '20/07/2026', judul: 'Laskar Pelangi' },
      { tanggal: '21/07/2026', judul: 'Bumi Manusia' }
    ]
  }
};

function showAlert(msg) {
  const box = document.getElementById('alertBox');
  document.getElementById('alertMessage').textContent = msg;
  box.classList.remove('hidden');
  setTimeout(() => { box.classList.add('hidden'); }, 4000);
}

function tutupAlert() {
  document.getElementById('alertBox').classList.add('hidden');
}

window.addEventListener('DOMContentLoaded', () => {
  muatDataAwal();
});

function tampilkanLoading(tampil) {
  document.getElementById('loading').classList.toggle('hidden', !tampil);
}

function tampilkanViewKelas() {
  document.getElementById('viewSiswa').classList.add('hidden');
  document.getElementById('breadcrumb').classList.add('hidden');
  document.getElementById('viewKelas').classList.remove('hidden');
}

function tampilkanViewSiswa() {
  document.getElementById('viewKelas').classList.add('hidden');
  document.getElementById('breadcrumb').classList.remove('hidden');
  document.getElementById('viewSiswa').classList.remove('hidden');
}

async function muatDataAwal() {
  tampilkanLoading(true);

  const isSheetUrl = WEBAPP_URL.includes('docs.google.com/spreadsheets');
  const isInvalidUrl = !WEBAPP_URL || WEBAPP_URL === 'GANTI_DENGAN_URL_WEB_APP_ANDA' || isSheetUrl;

  if (isInvalidUrl) {
    const banner = document.getElementById('statusBanner');
    const text = document.getElementById('statusText');
    banner.classList.remove('hidden');

    if (isSheetUrl) {
      banner.className = "mb-4 p-3 bg-rose-50 border border-rose-200 rounded-xl text-xs text-rose-800";
      text.innerHTML = `<strong>⚠️ URL Salah:</strong> URL yang dimasukkan adalah link Spreadsheet. Silakan gunakan <strong>URL Web App Apps Script</strong> (berakhiran <code>/exec</code>) dari menu <em>Deploy &gt; New Deployment</em>.`;
    } else {
      text.innerHTML = `<strong>Mode Demo:</strong> Menampilkan data contoh. Hubungkan ke Apps Script untuk data asli.`;
    }

    document.getElementById('tahunAjaranLabel').textContent = `TA ${MOCK_DATA.tahunAjaran} (Demo)`;
    CACHE_SISWA = MOCK_DATA.siswa;
    renderGridKelas(MOCK_DATA.kelas);
    tampilkanLoading(false);
    return;
  }

  document.getElementById('statusBanner').classList.add('hidden');

  try {
    // Pengambilan data tunggal (getInitialData)
    const res = await fetch(`${WEBAPP_URL}?action=getInitialData`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('tahunAjaranLabel').textContent = data.tahunAjaranAktif ? `TA ${data.tahunAjaranAktif}` : '';
    CACHE_SISWA = data.siswa || [];
    renderGridKelas(data.kelas);
  } catch (err) {
    showAlert('Gagal terhubung ke Apps Script. Menggunakan mode demo.');
    CACHE_SISWA = MOCK_DATA.siswa;
    renderGridKelas(MOCK_DATA.kelas);
  } finally {
    tampilkanLoading(false);
  }
}

function renderGridKelas(daftarKelas) {
  const grid = document.getElementById('gridKelas');
  grid.innerHTML = '';

  if (!daftarKelas || daftarKelas.length === 0) {
    grid.innerHTML = `
      <div class="col-span-full bg-amber-50 border border-amber-200 rounded-xl p-4 text-xs text-amber-800 space-y-2">
        <p class="font-bold">⚠️ Data Kelas Belum Ada di Google Sheets</p>
        <p>Pastikan Sheet <strong>Master_Siswa</strong> sudah berisi data dan kolom D (Kelas) terisi.</p>
      </div>
    `;
  } else {
    daftarKelas.forEach(kelas => {
      const btn = document.createElement('button');
      btn.className = 'py-3.5 px-3 rounded-xl bg-white border border-slate-200 shadow-xs text-slate-700 font-bold hover:border-blue-500 hover:text-blue-600 hover:shadow-md transition text-center text-sm';
      btn.textContent = kelas;
      btn.onclick = () => muatDaftarSiswa(kelas);
      grid.appendChild(btn);
    });
  }

  tampilkanViewKelas();
}

function muatDaftarSiswa(kelas) {
  // Tanpa loading / fetch tambahan -> Langsung saring dari CACHE_SISWA (Instan / 0s)
  const siswaList = CACHE_SISWA.filter(s => s.kelas && s.kelas.toLowerCase() === kelas.toLowerCase());
  renderListSiswa(siswaList, kelas);
}

function renderListSiswa(siswaList, kelas) {
  document.getElementById('labelKelasAktif').textContent = kelas;

  const list = document.getElementById('listSiswa');
  list.innerHTML = '';

  if (!siswaList || siswaList.length === 0) {
    list.innerHTML = '<p class="text-xs text-slate-400 text-center py-8">Belum ada siswa terdaftar di kelas ini</p>';
  } else {
    siswaList.forEach(s => {
      const card = document.createElement('div');
      card.className = 'flex items-center justify-between bg-white border border-slate-200/80 rounded-xl px-4 py-3 shadow-xs';
      card.innerHTML = `
        <span class="font-semibold text-slate-700 text-xs">${escapeHtml(s.namaPanggilan)}</span>
        <div class="flex gap-2">
          <button class="text-xs px-3 py-1.5 rounded-lg bg-blue-50 text-blue-600 font-semibold hover:bg-blue-100 transition">Input buku</button>
          <button class="text-xs px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 font-semibold hover:bg-slate-200 transition">Riwayat</button>
        </div>
      `;
      const [btnInput, btnRiwayat] = card.querySelectorAll('button');
      btnInput.onclick = () => bukaModalInput(s, kelas);
      btnRiwayat.onclick = () => bukaModalRiwayat(s, kelas);
      list.appendChild(card);
    });
  }

  tampilkanViewSiswa();
}

function bukaModalInput(siswa, kelas) {
  siswaAktif = { id: siswa.id, namaLengkap: siswa.namaLengkap, kelas: kelas };
  document.getElementById('infoSiswaInput').textContent = `${siswa.namaPanggilan} - Kelas ${kelas}`;
  document.getElementById('daftarInputBuku').innerHTML = '';
  tambahBarisJudul();
  document.getElementById('modalInput').classList.remove('hidden');
}

function tutupModalInput() {
  document.getElementById('modalInput').classList.add('hidden');
  siswaAktif = null;
}

function tambahBarisJudul() {
  const container = document.getElementById('daftarInputBuku');
  const idx = container.children.length + 1;

  const row = document.createElement('input');
  row.type = 'text';
  row.placeholder = `Judul buku ke-${idx}`;
  row.className = 'w-full border border-slate-300 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500';
  container.appendChild(row);
}

async function simpanSemuaBuku() {
  if (!siswaAktif) return;

  const inputs = document.querySelectorAll('#daftarInputBuku input');
  const daftarBuku = Array.from(inputs)
    .map(el => el.value.trim())
    .filter(v => v.length > 0);

  if (daftarBuku.length === 0) {
    showAlert('Isi minimal satu judul buku');
    return;
  }

  const btn = document.getElementById('btnSimpan');
  btn.disabled = true;
  btn.textContent = 'Menyimpan...';

  const isInvalidUrl = !WEBAPP_URL || WEBAPP_URL === 'GANTI_DENGAN_URL_WEB_APP_ANDA' || WEBAPP_URL.includes('docs.google.com/spreadsheets');

  if (isInvalidUrl) {
    setTimeout(() => {
      if (!MOCK_DATA.riwayat[siswaAktif.id]) MOCK_DATA.riwayat[siswaAktif.id] = [];
      const now = new Date();
      const tglStr = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;
      daftarBuku.forEach(j => MOCK_DATA.riwayat[siswaAktif.id].unshift({ tanggal: tglStr, judul: j }));

      showAlert(`[Demo Mode] ${daftarBuku.length} judul buku berhasil tersimpan!`);
      tutupModalInput();
      btn.disabled = false;
      btn.textContent = 'Simpan semua';
    }, 300);
    return;
  }

  try {
    const res = await fetch(WEBAPP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'simpanBuku',
        idSiswa: siswaAktif.id,
        namaSiswa: siswaAktif.namaLengkap,
        kelas: siswaAktif.kelas,
        daftarBuku: daftarBuku
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    showAlert(`${data.jumlahTersimpan} judul buku tersimpan untuk tanggal ${data.tanggal}`);
    tutupModalInput();
  } catch (err) {
    showAlert('Gagal menyimpan: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Simpan semua';
  }
}

async function bukaModalRiwayat(siswa, kelas) {
  document.getElementById('infoSiswaRiwayat').textContent = `${siswa.namaPanggilan} - Kelas ${kelas}`;
  document.getElementById('listRiwayat').innerHTML = '<p class="text-xs text-slate-400 text-center py-4">Memuat...</p>';
  document.getElementById('modalRiwayat').classList.remove('hidden');

  const isInvalidUrl = !WEBAPP_URL || WEBAPP_URL === 'GANTI_DENGAN_URL_WEB_APP_ANDA' || WEBAPP_URL.includes('docs.google.com/spreadsheets');

  if (isInvalidUrl) {
    renderListRiwayat(MOCK_DATA.riwayat[siswa.id] || []);
    return;
  }

  try {
    const res = await fetch(`${WEBAPP_URL}?action=getRiwayat&idSiswa=${encodeURIComponent(siswa.id)}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    renderListRiwayat(data.riwayat);
  } catch (err) {
    document.getElementById('listRiwayat').innerHTML =
      `<p class="text-xs text-rose-500 text-center py-4">Gagal memuat riwayat: ${escapeHtml(err.message)}</p>`;
  }
}

function renderListRiwayat(riwayatList) {
  const list = document.getElementById('listRiwayat');
  list.innerHTML = '';

  if (!riwayatList || riwayatList.length === 0) {
    list.innerHTML = '<p class="text-xs text-slate-400 text-center py-6">Belum ada riwayat buku dibaca</p>';
    return;
  }

  riwayatList.forEach(r => {
    const item = document.createElement('div');
    item.className = 'border border-slate-200 rounded-lg p-2.5 bg-slate-50';
    item.innerHTML = `
      <p class="text-xs font-semibold text-slate-800">${escapeHtml(r.judul)}</p>
      <p class="text-[10px] text-slate-400 mt-0.5">${escapeHtml(r.tanggal)}</p>
    `;
    list.appendChild(item);
  });
}

function tutupModalRiwayat() {
  document.getElementById('modalRiwayat').classList.add('hidden');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}
</script>
</body>
</html>
